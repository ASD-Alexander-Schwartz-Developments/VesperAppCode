# ─────────────────────────────────────────────────────────────────────────────
# COPY TO:  <cg-gnss repo>/.github/workflows/release.yml
#
# Builds a GNSS plugin pack (per os-arch), uploads it + updates the plugin feed.
# A pack = ASD.Gnss.dll + geotag(.exe) + aiding-server exe + GeoTagEngine.xml +
# Ionosphere.cg + plugin.json, zipped. VesperApp's PluginUpdateService reads the
# feed, downloads the pack for its platform, and stages it (binds next launch).
#
# Publish with:  git tag v1.0.0 && git push --tags
# ─────────────────────────────────────────────────────────────────────────────
name: Release GNSS plugin pack

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: read

env:
  S3_BUCKET:          ${{ vars.RELEASE_S3_BUCKET }}
  CF_DISTRIBUTION_ID: ${{ vars.RELEASE_CF_DISTRIBUTION_ID }}
  AWS_REGION:         ${{ vars.AWS_REGION }}
  S3_PREFIX: plugins/gnss      # CDN path → https://<cdn>/plugins/gnss/index.json
  ABI: "1"                     # MUST equal ASD.Contracts.ContractsAbi.Version

jobs:
  build:
    strategy:
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          # - { os: windows-latest, rid: win-x86 }   # cg-gnss's golden-validated arch
          # - { os: ubuntu-latest,  rid: linux-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # 1) ── BUILD THE NATIVES (geotag + aiding-server) for ${{ matrix.rid }} ───
      #    Use your CMake / make-release flow; copy outputs into pack/.
      - name: Build cg-gnss natives
        shell: bash
        run: |
          mkdir -p pack
          # ... cmake build geotag + freeze aiding-server ...
          # cp build/.../geotag(.exe) pack/
          # cp build/.../aiding-server(.exe) pack/      # <- the self-contained exe
          # cp runtime/GeoTagEngine.xml runtime/Ionosphere.cg pack/

      # 2) ── BUILD THE .NET ADAPTER (ASD.Gnss.dll) ─────────────────────────────
      - uses: actions/setup-dotnet@v4
        with: { dotnet-version: '8.0.x' }
      - name: Build ASD.Gnss.dll
        shell: bash
        run: |
          dotnet build bindings/dotnet/ASD.Gnss.csproj -c Release -o pack-dll   # adjust path
          cp pack-dll/ASD.Gnss.dll pack/

      # 3) ── Write plugin.json + zip the pack ──────────────────────────────────
      - name: Assemble pack
        id: pack
        shell: bash
        run: |
          VER="${GITHUB_REF_NAME#v}"; RID="${{ matrix.rid }}"
          cat > pack/plugin.json <<JSON
          { "name":"ASD.Gnss","kind":"gnss","version":"${VER}","abi":${ABI},
            "platform":"${RID}","entryDll":"ASD.Gnss.dll",
            "nativeFiles":["geotag","aiding-server","GeoTagEngine.xml","Ionosphere.cg"],
            "validatedArch":"win-x86","signature":null }
          JSON
          NAME="gnss-plugin-${VER}-${RID}.zip"
          ( cd pack && zip -r "../${NAME}" . )
          echo "ver=$VER"   >> "$GITHUB_OUTPUT"
          echo "rid=$RID"   >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "sha=$(sha256sum "$NAME" | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "size=$(stat -c%s "$NAME")" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Upload pack
        shell: bash
        run: |
          aws s3 cp "${{ steps.pack.outputs.name }}" \
            "s3://${S3_BUCKET}/${S3_PREFIX}/${{ steps.pack.outputs.ver }}/${{ steps.pack.outputs.name }}" \
            --no-progress

  # One feed update after all arches are uploaded (keeps index.json consistent).
  publish-feed:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ vars.AWS_REGION }}
      - name: Rebuild index.json from S3 listing
        shell: bash
        env:
          S3_BUCKET: ${{ vars.RELEASE_S3_BUCKET }}
          CF_DISTRIBUTION_ID: ${{ vars.RELEASE_CF_DISTRIBUTION_ID }}
          S3_PREFIX: plugins/gnss
        run: |
          VER="${GITHUB_REF_NAME#v}"; NOW="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          DESC="$(git tag -l --format='%(contents)' "${GITHUB_REF_NAME}")"
          aws s3 cp "s3://${S3_BUCKET}/${S3_PREFIX}/index.json" index.json \
            || echo '{"schema":1,"releases":[]}' > index.json
          # One entry per (version, rid) for everything uploaded under this version.
          ENTRIES="[]"
          for KEY in $(aws s3 ls "s3://${S3_BUCKET}/${S3_PREFIX}/${VER}/" | awk '{print $4}'); do
            RID="$(echo "$KEY" | sed -E 's/.*-([a-z0-9]+-[a-z0-9]+)\.zip/\1/')"
            SIZE=$(aws s3api head-object --bucket "$S3_BUCKET" --key "${S3_PREFIX}/${VER}/${KEY}" --query ContentLength --output text)
            ENTRIES=$(echo "$ENTRIES" | jq \
              --arg ver "$VER" --arg name "GNSS plugin ${VER}" --arg desc "$DESC" \
              --arg pub "$NOW" --arg target "$RID" --arg asset "${VER}/${KEY}" \
              --argjson size "$SIZE" --argjson abi 1 \
              '. + [{version:$ver,name:$name,description:$desc,published:$pub,
                     target:$target,asset:$asset,size:$size,abi:$abi}]')
          done
          jq --argjson new "$ENTRIES" --arg pub "$NOW" \
             '{schema:1, updated:$pub,
               releases: ($new + .releases) | unique_by(.version + "|" + .target)}' \
             index.json > index.new.json
          aws s3 cp index.new.json "s3://${S3_BUCKET}/${S3_PREFIX}/index.json" \
            --content-type application/json --no-progress
          aws cloudfront create-invalidation --distribution-id "${CF_DISTRIBUTION_ID}" \
            --paths "/${S3_PREFIX}/index.json"
